<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DateFlo | Sign In</title>
  <meta name="description" content="Sign in to your DateFlo dashboard. View your date plans, edit preferences, and plan your next date.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/forms.css">
  <style>
    .login-page{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(160deg,#1a0a10 0%,#2d1320 40%,#3a1428 60%,#1a0a10 100%);
      padding:clamp(20px,4vw,40px);position:relative;overflow:hidden;
    }
    .login-page::before{
      content:'';position:absolute;top:-30%;right:-20%;width:600px;height:600px;
      background:radial-gradient(circle,rgba(224,87,128,.1) 0%,transparent 70%);
      pointer-events:none;animation:pulse 8s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
    .login-card{
      background:var(--glass);border:1px solid var(--glass-border);
      border-radius:var(--radius-xl);padding:clamp(36px,5vw,52px);
      backdrop-filter:blur(16px);max-width:440px;width:100%;
      position:relative;z-index:1;text-align:center;
    }
    .login-logo{
      font-family:'Playfair Display',serif;font-size:2rem;font-weight:800;
      color:var(--rose);margin-bottom:8px;
    }
    .login-tagline{color:var(--text-muted);font-size:.88rem;margin-bottom:36px}
    .login-title{
      font-family:'Playfair Display',serif;font-size:clamp(1.6rem,3vw,2rem);
      font-weight:700;margin-bottom:8px;
    }
    .login-sub{color:var(--text-soft);font-size:.92rem;margin-bottom:32px;line-height:1.7}
    .login-form{text-align:left}
    .login-btn{width:100%;justify-content:center;margin-top:8px;padding:16px}
    .login-divider{
      display:flex;align-items:center;gap:16px;margin:28px 0;
      color:var(--text-muted);font-size:.8rem;
    }
    .login-divider::before,.login-divider::after{
      content:'';flex:1;height:1px;background:var(--glass-border);
    }
    .invite-toggle{
      color:var(--text-muted);font-size:.85rem;cursor:pointer;
      transition:color .2s;background:none;border:none;
      text-decoration:underline;text-underline-offset:3px;
    }
    .invite-toggle:hover{color:var(--rose)}
    .invite-section{display:none;margin-top:20px;text-align:left}
    .invite-section.open{display:block;animation:fadeIn .3s ease}
    .login-footer{
      margin-top:32px;padding-top:24px;border-top:1px solid var(--glass-border);
      font-size:.82rem;color:var(--text-muted);
    }
    .login-footer a{color:var(--rose);text-decoration:underline;text-underline-offset:3px}

    /* Success state */
    .email-sent{display:none;text-align:center}
    .email-sent.show{display:block;animation:fadeIn .4s ease}
    .email-sent .sent-icon{font-size:3.5rem;margin-bottom:16px}
    .email-sent h2{font-family:'Playfair Display',serif;font-size:1.6rem;margin-bottom:10px}
    .email-sent p{color:var(--text-soft);font-size:.92rem;line-height:1.7}
    .email-sent .email-highlight{color:var(--rose);font-weight:600}
    .email-resend{
      margin-top:24px;color:var(--text-muted);font-size:.82rem;
      background:none;border:none;cursor:pointer;text-decoration:underline;
    }
    .email-resend:hover{color:var(--rose)}
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">DateFlo</div>
      <div class="login-tagline">Your date planning dashboard</div>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="login-title">Welcome</div>
        <p class="login-sub">Enter your email and we'll send you a magic link to sign in. No password needed.</p>

        <div class="login-form">
          <div class="form-group">
            <label>Email Address <span class="req">*</span></label>
            <input type="email" class="form-input" id="emailInput" placeholder="you@example.com" required autofocus>
          </div>
          <button class="btn-primary login-btn" id="sendLinkBtn" onclick="handleSendLink()">
            Send Magic Link &rarr;
          </button>
        </div>

        <div class="login-divider">or</div>

        <button class="invite-toggle" onclick="toggleInvite()">Have an invite code?</button>
        <div class="invite-section" id="inviteSection">
          <div class="form-group">
            <label>Invite Code</label>
            <input type="text" class="form-input" id="inviteCodeInput" placeholder="Enter your 12 character code">
          </div>
          <button class="btn-ghost btn-small" style="width:100%;justify-content:center" onclick="handleInviteCode()">
            Join with Code
          </button>
        </div>

        <div class="login-footer">
          New here? <a href="https://dateflo.com" target="_blank">Get a date plan at dateflo.com</a>
        </div>
      </div>

      <!-- Email Sent Confirmation -->
      <div class="email-sent" id="emailSent">
        <div class="sent-icon">✉️</div>
        <h2>Check Your Email</h2>
        <p>We sent a magic link to<br><span class="email-highlight" id="sentEmailDisplay"></span></p>
        <p style="margin-top:12px;font-size:.85rem;color:var(--text-muted)">Click the link in the email to sign in. It may take a minute to arrive.</p>
        <button class="email-resend" onclick="handleResend()">Didn't get it? Resend</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { getSession, sendMagicLink } from './js/auth.js';

    // If already authenticated, redirect to dashboard
    const session = await getSession();
    if (session) {
      window.location.href = './dashboard.html';
    }

    // Check if returning from magic link with invite code stored
    const storedCode = localStorage.getItem('dateflo_invite_code');
    if (storedCode && session) {
      // Will be handled by dashboard onboarding
      window.location.href = './dashboard.html';
    }

    // Make functions available globally
    window.handleSendLink = async function() {
      const email = document.getElementById('emailInput').value.trim();
      if (!email) { alert('Please enter your email address.'); return; }

      const btn = document.getElementById('sendLinkBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      const { error } = await sendMagicLink(email);

      if (error) {
        alert('Something went wrong: ' + error.message);
        btn.disabled = false;
        btn.innerHTML = 'Send Magic Link &rarr;';
        return;
      }

      // Show success state
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('emailSent').classList.add('show');
      document.getElementById('sentEmailDisplay').textContent = email;
      window._lastEmail = email;
    };

    window.handleResend = async function() {
      if (window._lastEmail) {
        await sendMagicLink(window._lastEmail);
        const btn = document.querySelector('.email-resend');
        btn.textContent = 'Sent! Check your inbox.';
        setTimeout(() => { btn.textContent = "Didn't get it? Resend"; }, 3000);
      }
    };

    window.toggleInvite = function() {
      document.getElementById('inviteSection').classList.toggle('open');
    };

    window.handleInviteCode = function() {
      const code = document.getElementById('inviteCodeInput').value.trim();
      if (!code) { alert('Please enter an invite code.'); return; }
      // Store code and prompt for email
      localStorage.setItem('dateflo_invite_code', code);
      document.getElementById('inviteSection').style.display = 'none';
      document.querySelector('.invite-toggle').style.display = 'none';
      document.querySelector('.login-sub').textContent = 'Great! Enter your email to sign in and join your partner.';
    };

    // Handle Enter key
    document.getElementById('emailInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') window.handleSendLink();
    });
  </script>
</body>
</html>
